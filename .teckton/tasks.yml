apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cicd-task
spec:
  steps:
    - name: install-dependencies
      image: node:18
      script: |
        npm install

    - name: run-tests
      image: node:18
      script: |
        npm test

    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning workspace"
        rm -rf node_modules
